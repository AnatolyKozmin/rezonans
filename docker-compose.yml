# Rezonans: веб (nginx) + API. Демо для заказчика: бот не нужен — не включайте profile bot.
# Снаружи по умолчанию порт веба WEB_PORT (8080 — чтобы не конфликтовать с nginx на :80 на том же хосте).
# Нужен именно 80: в .env задайте WEB_PORT=80.
#
# Запуск демо: docker compose up -d --build
# API с хоста на :4000 (отладка): docker compose -f docker-compose.yml -f docker-compose.debug.yml up -d
# С ботом: docker compose --profile bot up -d --build
#
# На сервере задайте CORS_ORIGIN и PUBLIC_WEB_URL под ваш URL (например https://demo.example.com).
#
# База и файлы адвента: bind-mount в ./apps/api/data и ./apps/api/uploads (на хосте, рядом с кодом).
# Пересборка образа их не трогает; бэкап — копия этих папок. Именованные тома не используются.
# Раньше были тома api_data / api_uploads: при переходе один раз перенесите их содержимое в эти каталоги, если нужны старые данные.

services:
  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    restart: unless-stopped
    environment:
      # Абсолютный путь = всегда тот же файл, что в bind-mount ./apps/api/data (не зависит от cwd Node).
      DATABASE_URL: file:/app/apps/api/data/db.sqlite
      API_PORT: "4000"
      API_PUBLIC_URL: ${API_PUBLIC_URL:-http://localhost:4000}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
      ADMIN_API_KEY: ${ADMIN_API_KEY:-dev-admin-key}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-dev-internal-key}
      CAMPAIGN_START_DATE: ${CAMPAIGN_START_DATE:-2026-04-14}
      TZ: ${TZ:-Europe/Moscow}
      ADVENT_REMINDER_HOURS: ${ADVENT_REMINDER_HOURS:-24}
      # Для демо/теста UI: открыть все дни адвента (в проде не включать)
      TESTING_UNLOCK_ALL_ADVENT: ${TESTING_UNLOCK_ALL_ADVENT:-}
    volumes:
      - ./apps/api/data:/app/apps/api/data
      - ./apps/api/uploads:/app/apps/api/uploads
    expose:
      - "4000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 25s

  web:
    build:
      context: .
      dockerfile: docker/web/Dockerfile
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-8080}:80"

  bot:
    profiles:
      - bot
    build:
      context: .
      dockerfile: docker/bot/Dockerfile
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      API_BASE_URL: http://api:4000
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-dev-internal-key}
      PUBLIC_WEB_URL: ${PUBLIC_WEB_URL:-http://localhost:8080}
